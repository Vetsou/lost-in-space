name: Build project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
          cache: true

      - name: Restore dependencies
        run: dotnet restore

      - name: Check formatting
        run: dotnet format LostInSpace.sln --verify-no-changes --verbosity diagnostic

      - name: Build project
        run: dotnet build LostInSpace.sln --configuration ExportRelease --no-restore